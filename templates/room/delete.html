{% extends "base.html" %}
{% block title %}{{ title }} | Edu Tizim{% endblock %}
{% block content %}
<div class="card form-card" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">
        <h3><i class="fas fa-exclamation-triangle" style="color: #dc2626;"></i> {{ title }}</h3>
    </div>
    <div class="card-body" style="text-align: center;">
        <i class="fas fa-trash" style="font-size: 48px; color: #dc2626; margin-bottom: 16px;"></i>
        <p style="font-size: 1.1rem; margin-bottom: 24px; color: #475569;">
            "<strong>{{ object.name }}</strong>" ni o'chirishni xohlaysizmi?
        </p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions" style="justify-content: center;">
                <a href="{% url 'room_list' %}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Bekor qilish</a>
                <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i> O'chirish</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
