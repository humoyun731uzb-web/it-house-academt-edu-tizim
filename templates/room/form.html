{% extends "base.html" %}
{% block title %}{{ title }} | Edu Tizim{% endblock %}
{% block content %}
<div class="card form-card">
    <div class="card-header">
        <h3><i class="fas {% if 'qo\'shish' in title %}fa-plus-circle{% else %}fa-edit{% endif %}"></i> {{ title }}</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="field-error">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <div class="form-actions">
                <a href="{% url 'room_list' %}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Bekor qilish</a>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Saqlash</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
