<!DOCTYPE html>
{% load static %}
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT House - O'quvchi kirish</title>
    <link rel="stylesheet" href="{% static 'fontawesomefree/css/all.min.css' %}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .login-card .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .login-card .logo i {
            font-size: 32px;
            color: #6366f1;
        }
        .login-card .logo span {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
        }
        .login-card .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 15px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color .2s;
            font-family: inherit;
        }
        .form-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .phone-wrapper {
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color .2s;
        }
        .phone-wrapper:focus-within {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .phone-wrapper .prefix {
            padding: 12px 8px 12px 16px;
            font-size: 15px;
            color: #64748b;
            font-weight: 600;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
        }
        .phone-wrapper input {
            border: none !important;
            border-radius: 0 !important;
            flex: 1;
        }
        .phone-wrapper input:focus { box-shadow: none !important; }
        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.35);
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #fecaca;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
        }
        .register-link a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover { text-decoration: underline; }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>IT House</span>
        </div>
        <div class="subtitle">O'quvchi kabinetiga kirish</div>
        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            {{ error }}
        </div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Telefon raqam</label>
                <div class="phone-wrapper">
                    <span class="prefix">+998</span>
                    <input type="tel" name="phone" placeholder="XX XXX XX XX" value="{{ phone|default:'' }}" required maxlength="12" oninput="this.value=this.value.replace(/\D/g,'')">
                </div>
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="password" placeholder="Parolingizni kiriting" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right"></i> Kirish
            </button>
        </form>
        <div class="register-link">
            Hisobingiz yo'qmi? <a href="#">Telegram bot orqali ro'yxatdan o'ting</a>
        </div>
        <div class="login-footer">
            IT House Akademiyasi &copy; {% now "Y" %}
        </div>
    </div>
</body>
</html>
